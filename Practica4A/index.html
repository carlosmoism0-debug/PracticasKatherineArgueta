<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table,th,td{
            border: 1px solid Black;
            border-collapse: collapse;
        }

        tr:nth-child(even){
            background-color:cadetblue;
        }
    </style>
</head>
<body>
    <table>
        <caption>Valores nutricionales del pollito</caption>

        <tr>
            <th>Componente</th>
            <th>Cantidad</th>
            <th>Valor nutricional</th>
        </tr>

        <tr>
            <td rowspan="3">Proteínas</td>
            <td>25g</td>
            <td>50%</td>
        </tr>

        <tr>
            <td>12g</td>
            <td>2%</td>
        </tr>

        <tr>
            <td>Carbohidratos</td>
            <td>2g</td>
            <td>1%</td>
        </tr>
        <tr>
            <tdcolspan="3">*Basado en una dieta de 2000 kcal diarias</td>
        </tr>
    </table>
</body>
</html>
